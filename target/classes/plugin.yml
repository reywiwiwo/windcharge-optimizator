name: WindChargeOptimizer
version: '1.0.0'
main: com.minecraft.windcharge.WindChargeOptimizer
api-version: 1.21
author: TuNombre
description: Plugin para optimizar cargas de viento combinándolas en una sola entidad
commands:
  windcharge:
    description: Comando para configurar el optimizador de cargas de viento
    usage: /windcharge <reload|toggle|info>
    permission: windcharge.admin
permissions:
  windcharge.admin:
    description: Permiso para administrar el plugin
    default: op
  windcharge.use:
    description: Permiso para usar la optimización de cargas de viento
    default: true
