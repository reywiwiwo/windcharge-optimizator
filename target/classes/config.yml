# Configuración del WindChargeOptimizer

# Radio de búsqueda para combinar cargas de viento (en bloques)
search-radius: 10.0

# Intervalo de verificación en ticks (20 ticks = 1 segundo)
check-interval: 5

# Número mínimo de cargas para combinar
minimum-charges: 2

# Máximo número de cargas por entidad combinada
max-charges-per-entity: 50

# Modo de acumulación automática (siempre activo)
auto-accumulate: true

# Mostrar mensajes de debug en consola
debug-mode: false

# Mundos donde el plugin está activo (vacío = todos los mundos)
enabled-worlds: []

# Partículas visuales cuando se combinan cargas
show-particles: true

# Sonido cuando se combinan cargas
play-sound: true

# Mostrar tag con número de cargas encima de la entidad
show-charge-tag: true

# Color del tag (formato hexadecimal)
tag-color: "#FFAA00"

# Heredar características de la primera carga (velocidad, dirección, etc.)
inherit-first-charge-properties: true

# Actualizar tag continuamente cuando se añaden más cargas
update-tag-continuously: true

# --- Configuración de Optimización de Rendimiento ---

# Máximo número de explosiones procesadas por tick (evita timeouts)
max-explosions-per-tick: 5

# Potencia máxima de explosión (limita explosiones extremadamente grandes)
max-explosion-power: 100.0

# Máximo número de bloques afectados por explosión (reduce lag)
max-blocks-per-explosion: 200

# --- Configuración de Knockback Masivo ---

# Radio base de knockback en bloques
knockback-base-radius: 5.0

# Radio adicional por cada carga acumulada
knockback-radius-per-charge: 0.5

# Fuerza base de knockback
knockback-base-force: 2.0

# Fuerza adicional por cada carga acumulada
knockback-force-per-charge: 0.3

# Porcentaje de fuerza vertical (0.0 = horizontal, 1.0 = vertical)
knockback-vertical-ratio: 0.8

# Impulso extra para jugadores
knockback-player-boost: 0.5
